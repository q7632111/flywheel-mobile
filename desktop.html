<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>飛輪系統 V22 UI（最終版）</title>
<style>
body {
    font-family: "Segoe UI", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    margin: 0;
    padding: 20px;
}
.container {
    max-width: 900px;
    margin: auto;
}
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}
h1 {
    text-align: center;
}
input {
    padding: 10px;
    width: 100%;
    margin-top: 5px;
    border-radius: 10px;
    border: none;
}
.result {
    font-size: 26px;
    font-weight: bold;
    text-align: center;
    margin-top: 20px;
}
.big {
    font-size: 40px;
    text-align: center;
    margin-top: 20px;
}
.green { color: #22c55e; }
.red { color: #ef4444; }
.yellow { color: #facc15; }
</style>
</head>

<body>
<div class="container">

<h1>🚀 飛輪決策系統 V22</h1>

<div class="card">
<label>水庫金額（萬）</label>
<input id="pool" type="number" placeholder="例如：30">

<label>20MA乖離（%）</label>
<input id="bias" type="number" placeholder="例如：12">

<label>
<input type="checkbox" id="cooldown"> 今日已收割（啟動冷卻）
</label>
</div>

<div class="card">
<div id="zone"></div>
<div id="action" class="big"></div>
<div id="detail" class="result"></div>
</div>

</div>

<script>
function calc() {
    let pool = parseFloat(document.getElementById("pool").value);
    let bias = parseFloat(document.getElementById("bias").value);
    let cooldown = document.getElementById("cooldown").checked;

    let zone = "";
    let action = "";
    let detail = "";

    if (cooldown) {
        action = "⛔ 冷卻中（禁止操作）";
        document.getElementById("action").className = "big yellow";
        document.getElementById("zone").innerText = "冷卻鎖";
        document.getElementById("detail").innerText = "等待5天";
        return;
    }

    // 判斷區域
    if (pool < 15) {
        zone = "🔴 戰時";
        if (bias >= 10) {
            action = "🔴 收割（砍至50%）";
            detail = "100%回水庫";
        } else if (bias >= 5) {
            action = "🔴 收割10%";
            detail = "100%回水庫";
        } else {
            action = "🟢 持有";
        }
    }

    else if (pool < 18) {
        zone = "🟡 過渡";
        if (bias >= 10) {
            action = "🔴 收割（砍至50%）";
        } else if (bias >= 5) {
            action = "🔴 收割10%";
        } else {
            action = "🟢 持有";
        }
        detail = "100%回水庫";
    }

    else if (pool < 60) {
        zone = "⚡ 點火";
        if (bias >= 20) {
            action = "🔴 收割20%";
        } else if (bias >= 15) {
            action = "🔴 收割20%";
        } else if (bias >= 10) {
            action = "🔴 收割10%";
        } else {
            action = "🟢 持有";
        }
        detail = "50%水庫 / 50%原王";
    }

    else if (pool <= 100) {
        zone = "🔥 厚尾準備";
        if (bias >= 20) {
            action = "🔴 收割20%";
        } else if (bias >= 15) {
            action = "🔴 收割20%";
        } else if (bias >= 10) {
            action = "🔴 收割10%";
        } else {
            action = "🟢 持有";
        }
        detail = "底倉≥70%｜50/50分流";
    }

    else {
        zone = "🚀 厚尾";
        if (bias >= 25) {
            action = "🔴 收割20%";
        } else if (bias >= 15) {
            action = "🔴 收割10%";
        } else {
            action = "🟢 持有";
        }
        detail = "底倉≥85%｜50/50分流";
    }

    document.getElementById("zone").innerText = zone;
    document.getElementById("action").innerText = action;
    document.getElementById("detail").innerText = detail;

    if (action.includes("收割")) {
        document.getElementById("action").className = "big red";
    } else {
        document.getElementById("action").className = "big green";
    }
}

document.querySelectorAll("input").forEach(i => {
    i.addEventListener("input", calc);
});
</script>

</body>
</html>
