<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>飛輪系統 V22.5（完整進階版）</title>

<style>
body {
    background:#0f172a;
    color:#e2e8f0;
    font-family:sans-serif;
    margin:0;
    padding:20px;
}
.container { max-width:1200px; margin:auto; }
.card {
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}
h1 { text-align:center; }

.grid {
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:15px;
}

input {
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
}

.big {
    font-size:26px;
    font-weight:bold;
    text-align:center;
    margin-top:10px;
}

.red{color:#ef4444;}
.green{color:#22c55e;}
.yellow{color:#facc15;}
</style>
</head>

<body>
<div class="container">

<h1>🚀 飛輪系統 V22.5 完整版</h1>

<div class="card">
<label>水庫金額（萬）</label>
<input id="pool">

<label>總資產（萬）</label>
<input id="asset">
</div>

<div class="card grid">
<div>
<h3>王1</h3>
<input id="b1" placeholder="乖離%">
<input type="checkbox" id="c1">冷卻
<div id="r1" class="big"></div>
</div>

<div>
<h3>王2</h3>
<input id="b2">
<input type="checkbox" id="c2">冷卻
<div id="r2" class="big"></div>
</div>

<div>
<h3>王3</h3>
<input id="b3">
<input type="checkbox" id="c3">冷卻
<div id="r3" class="big"></div>
</div>
</div>

<div class="card">
<h3>戰區判斷</h3>
<div id="zone" class="big"></div>
</div>

<div class="card">
<h3>防碎鑽判斷</h3>
<div id="lock" class="big"></div>
</div>

</div>

<script>
function getZone(pool){
    if(pool<15) return "戰時";
    if(pool<18) return "過渡";
    if(pool<60) return "點火";
    if(pool<=100) return "厚尾準備";
    return "厚尾";
}

function getAction(bias,pool,cool){
    if(cool) return ["⛔冷卻","yellow"];

    if(pool<15){
        if(bias>=10) return ["🔴砍至50%","red"];
        if(bias>=5) return ["🔴收10%","red"];
    }

    if(pool<18){
        if(bias>=10) return ["🔴砍至50%","red"];
        if(bias>=5) return ["🔴收10%","red"];
    }

    if(pool<60){
        if(bias>=20) return ["🔴收20%","red"];
        if(bias>=15) return ["🔴收20%","red"];
        if(bias>=10) return ["🔴收10%","red"];
    }

    if(pool<=100){
        if(bias>=20) return ["🔴收20%","red"];
        if(bias>=15) return ["🔴收20%","red"];
        if(bias>=10) return ["🔴收10%","red"];
    }

    if(pool>100){
        if(bias>=25) return ["🔴收20%","red"];
        if(bias>=15) return ["🔴收10%","red"];
    }

    return ["🟢持有","green"];
}

function calc(){
    let pool=parseFloat(poolInput.value)||0;
    let asset=parseFloat(assetInput.value)||0;

    let zone=getZone(pool);
    zoneDiv.innerText=zone;

    let b=[b1.value,b2.value,b3.value];
    let c=[c1.checked,c2.checked,c3.checked];
    let r=[r1,r2,r3];

    for(let i=0;i<3;i++){
        let bias=parseFloat(b[i])||0;
        let [txt,color]=getAction(bias,pool,c[i]);
        r[i].innerText=txt;
        r[i].className="big "+color;
    }

    // 防碎鑽
    if(asset<300 || pool<60){
        lock.innerText="⛔禁止開新王";
        lock.className="big red";
    }else{
        lock.innerText="🟢可評估開新王";
        lock.className="big green";
    }
}

let poolInput=document.getElementById("pool");
let assetInput=document.getElementById("asset");
let zoneDiv=document.getElementById("zone");
let lock=document.getElementById("lock");

let b1=document.getElementById("b1");
let b2=document.getElementById("b2");
let b3=document.getElementById("b3");

let c1=document.getElementById("c1");
let c2=document.getElementById("c2");
let c3=document.getElementById("c3");

let r1=document.getElementById("r1");
let r2=document.getElementById("r2");
let r3=document.getElementById("r3");

document.querySelectorAll("input").forEach(i=>{
    i.addEventListener("input",calc);
});
</script>

</body>
</html>
