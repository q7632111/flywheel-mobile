<!-- 🔥 只顯示關鍵新增區塊（你貼時直接覆蓋原本script即可） -->
<script>

// =============================
// 🧠 20.1 核心補強區（新增）
// =============================

// 🔥 攻擊力保護鎖
function isAttackTooLow(totalAssets, reservoir){
  const attack = totalAssets - reservoir;
  if(totalAssets <= 0) return false;
  const ratio = attack / totalAssets;
  return ratio < 0.6;
}

// 🔥 每王每月收割次數
function getHarvestCount(code){
  return Number(localStorage.getItem(code+'_harvestCount') || 0);
}

function addHarvestCount(code){
  const count = getHarvestCount(code) + 1;
  localStorage.setItem(code+'_harvestCount', count);
}

function resetHarvestCountIfNewMonth(){
  const key = "harvest_month";
  const current = getCurrentMonthKey();
  const saved = localStorage.getItem(key);

  if(saved !== current){
    localStorage.setItem(key, current);
    kingDefs.forEach(k=>{
      localStorage.setItem(k.code+'_harvestCount', 0);
    });
  }
}

// 🔥 極速保命模式
function getEmergencyLimit(reservoir){
  if(reservoir < 80000) return 1;
  if(reservoir < 120000) return 2;
  if(reservoir < 150000) return 3;
  return Infinity;
}

// 🔥 完整水庫5階段
function getBattleZone(reservoir){
  if(reservoir < 150000){
    return { key:'war', name:'戰時' };
  }
  if(reservoir < 180000){
    return { key:'transition', name:'過渡' };
  }
  if(reservoir < 600000){
    return { key:'ignite', name:'點火' };
  }
  if(reservoir < 1000000){
    return { key:'prepare', name:'厚尾準備' };
  }
  return { key:'compound', name:'厚尾複利' };
}

// =============================
// 🧠 收割決策（覆蓋舊版）
// =============================

function getHarvestDecision20(deviation, reservoir, cooldownRemain, totalAssets, code){

  const zone = getBattleZone(reservoir);

  // 🔥 攻擊力鎖
  if(isAttackTooLow(totalAssets, reservoir)){
    return {
      signal:'鎖定',
      text:'🛑 攻擊力不足，禁止收割'
    };
  }

  // 🔥 冷卻
  if(cooldownRemain > 0){
    return {
      signal:'冷卻',
      text:`冷卻中 ${cooldownRemain} 天`
    };
  }

  // 🔥 收割次數限制
  if(getHarvestCount(code) >= 2){
    return {
      signal:'限制',
      text:'本月已收割2次'
    };
  }

  // =====================
  // 🔥 各區收割規則
  // =====================

  if(zone.key === 'war' || zone.key === 'transition'){
    if(deviation >= 10){
      addHarvestCount(code);
      return {signal:'收割', text:'收至50%'};
    }
    if(deviation >= 5){
      addHarvestCount(code);
      return {signal:'收割', text:'收10%'};
    }
  }

  if(zone.key === 'ignite'){
    if(deviation >= 20){
      addHarvestCount(code);
      return {signal:'收割', text:'收20%'};
    }
    if(deviation >= 15){
      addHarvestCount(code);
      return {signal:'收割', text:'收20%'};
    }
    if(deviation >= 10){
      addHarvestCount(code);
      return {signal:'收割', text:'收10%'};
    }
  }

  if(zone.key === 'prepare'){
    if(deviation >= 20){
      addHarvestCount(code);
      return {signal:'收割', text:'收20%'};
    }
    if(deviation >= 15){
      addHarvestCount(code);
      return {signal:'收割', text:'收20%'};
    }
    if(deviation >= 10){
      addHarvestCount(code);
      return {signal:'收割', text:'收10%'};
    }
  }

  if(zone.key === 'compound'){
    if(deviation >= 25){
      addHarvestCount(code);
      return {signal:'收割', text:'收20%'};
    }
    if(deviation >= 15){
      addHarvestCount(code);
      return {signal:'收割', text:'收10%'};
    }
  }

  return {signal:'等待', text:'不動'};
}

// =============================
// 🧠 updateVisuals 強化
// =============================

function updateVisuals(){

  resetMonthlyIfNeeded();
  resetHarvestCountIfNewMonth();

  const totalAssets = Number(safeEl('totalAssets')?.value || 0);
  const reservoir = Number(safeEl('reservoir')?.value || 0);

  kingDefs.forEach(k => {

    const prices = parsePrices(safeEl(k.code+'_prices')?.value || '');
    const calc = calcDeviation(prices);
    if(!calc) return;

    const deviation = calc.deviation;
    const cooldownRemain = getCooldownRemaining(
      safeEl(k.code+'_lastHarvestDate')?.value
    );

    const decision = getHarvestDecision20(
      deviation,
      reservoir,
      cooldownRemain,
      totalAssets,
      k.code
    );

    safeSetText('decision_'+k.code, decision.text);

    // 🔥 顯示本月收割次數
    const count = getHarvestCount(k.code);
    safeSetText('signal_'+k.code, `${decision.signal} (${count}/2)`);

  });

}

</script>
