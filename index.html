<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>飛輪操盤系統 Mobile V2</title>
  <style>
    :root{
      --bg:#07111f;
      --bg2:#0a1729;
      --card:rgba(15,23,42,.88);
      --line:rgba(255,255,255,.08);
      --text:#f8fafc;
      --muted:#94a3b8;
      --cyan:#22d3ee;
      --emerald:#34d399;
      --amber:#fbbf24;
      --rose:#fb7185;
      --violet:#a78bfa;
      --sky:#38bdf8;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;padding:0;
      background:
        radial-gradient(circle at 20% 0%, rgba(34,211,238,.15), transparent 24%),
        radial-gradient(circle at 100% 20%, rgba(167,139,250,.12), transparent 20%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }
    body{min-height:100vh;padding:14px 14px 28px;}
    .shell{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
    .glass{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:0 14px 40px rgba(0,0,0,.28);
      backdrop-filter:blur(14px)
    }
    .hero{padding:18px}
    .pill{
      display:inline-flex;padding:6px 10px;border-radius:999px;font-size:11px;font-weight:900;
      letter-spacing:.16em;border:1px solid rgba(34,211,238,.25);
      background:rgba(34,211,238,.1);color:#9beaf5
    }
    h1{margin:10px 0 0;font-size:28px;line-height:1.1}
    p{margin:8px 0 0;color:var(--muted);line-height:1.6}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .stats .box,.mini,.king .stat,.signal-box{
      background:rgba(2,6,23,.55);
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;padding:12px
    }
    .label{font-size:12px;color:var(--muted);margin-bottom:6px}
    .value{font-weight:900;font-size:20px;line-height:1.15}
    .mono{font-variant-numeric:tabular-nums}
    .section{padding:16px}
    .section h2{margin:0 0 12px;font-size:18px}
    .toolbar{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    button,.btn-link{
      appearance:none;border:none;border-radius:16px;padding:14px 14px;font-weight:900;
      font-size:15px;cursor:pointer;color:#04111f;
      background:linear-gradient(180deg,#63f3ff,#2ed8ea);
      box-shadow:0 6px 18px rgba(34,211,238,.24);
    }
    button.secondary{
      background:rgba(34,211,238,.08);color:#c8f8ff;border:1px solid rgba(34,211,238,.28);box-shadow:none
    }
    button.dark{
      background:rgba(255,255,255,.04);color:var(--text);border:1px solid rgba(255,255,255,.08);box-shadow:none
    }
    input,textarea,select{
      width:100%;background:rgba(2,6,23,.72);border:1px solid rgba(148,163,184,.18);
      color:white;border-radius:16px;padding:13px 14px;font-size:16px;outline:none;
    }
    input:focus,textarea:focus,select:focus{
      border-color:rgba(34,211,238,.8);box-shadow:0 0 0 3px rgba(34,211,238,.12)
    }
    textarea{min-height:88px;resize:vertical}
    .stack{display:flex;flex-direction:column;gap:10px}
    .chip{
      display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 11px;
      font-size:12px;font-weight:900
    }
    .chip.ok{background:rgba(52,211,153,.16);color:#b6f6df;border:1px solid rgba(52,211,153,.25)}
    .chip.warn{background:rgba(251,191,36,.16);color:#fde7a5;border:1px solid rgba(251,191,36,.22)}
    .chip.danger{background:rgba(251,113,133,.14);color:#fecdd6;border:1px solid rgba(251,113,133,.22)}
    .balance{display:flex;border-radius:999px;overflow:hidden;height:14px;background:rgba(255,255,255,.06)}
    .balance .attack{background:linear-gradient(90deg,#38bdf8,#22d3ee)}
    .balance .defense{background:linear-gradient(90deg,#fbbf24,#f59e0b)}
    .king{padding:16px;display:flex;flex-direction:column;gap:12px}
    .king-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .king-title{font-size:19px;font-weight:900}
    .king-sub{font-size:12px;color:var(--muted);margin-top:4px}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .king .value{font-size:18px}
    .actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .actions button,.actions .btn-link{padding:12px 10px;font-size:13px;text-align:center;text-decoration:none}
    .actions .btn-link{
      display:flex;align-items:center;justify-content:center;
      background:rgba(34,211,238,.08);color:#c8f8ff;border:1px solid rgba(34,211,238,.28);box-shadow:none
    }
    .cool{font-size:13px;font-weight:900}
    .cool.ok{color:#86efac}.cool.warn{color:#fde68a}.cool.danger{color:#fda4af}
    .note{font-size:12px;line-height:1.55;color:var(--muted)}
    .summary{font-size:14px;line-height:1.7;color:#def7ff}
    .decision{
      border-radius:18px;padding:12px 14px;font-size:14px;font-weight:900;line-height:1.6
    }
    .decision.harvest{
      background:rgba(251,113,133,.14);
      border:1px solid rgba(251,113,133,.25);
      color:#ffd1d8;
    }
    .decision.watch{
      background:rgba(251,191,36,.12);
      border:1px solid rgba(251,191,36,.22);
      color:#fde7a5;
    }
    .decision.add{
      background:rgba(52,211,153,.14);
      border:1px solid rgba(52,211,153,.22);
      color:#b6f6df;
    }
    .decision.idle{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      color:#e2e8f0;
    }
    .dev-positive{color:#fecdd3 !important}
    .dev-mid{color:#fde68a !important}
    .dev-low{color:#86efac !important}
  </style>
</head>
<body>
  <div class="shell">
    <section class="glass hero">
      <div class="pill">FLYWHEEL MOBILE · DEVIATION COMMAND</div>
      <h1>飛輪操盤系統</h1>
      <p>手機強化版。這版主打：自動算 20MA、即時乖離、收割訊號、10 日觸發加碼、冷卻倒數、攻守比例。</p>
    </section>

    <section class="glass section stats">
      <div class="grid2">
        <div class="box"><div class="label">同步狀態</div><div id="syncBadge" class="value" style="font-size:18px;color:#67e8f9">未同步</div></div>
        <div class="box"><div class="label">最後同步</div><div id="lastSyncTime" class="value mono" style="font-size:16px">—</div></div>
        <div class="box"><div class="label">本月狀態</div><div id="monthStatusText" class="value" style="font-size:18px;color:#86efac">綠燈</div><div id="monthStatusHint" class="note">節奏正常</div></div>
        <div class="box"><div class="label">資產階段</div><div id="phaseText" class="value" style="font-size:18px">基礎累積期</div><div class="note">月份鍵：<span id="monthKeyText">—</span></div></div>
      </div>
      <div class="toolbar" style="margin-top:10px">
        <button id="reloadBtn" class="secondary">重新載入</button>
        <button id="saveBtn">儲存同步</button>
      </div>
    </section>

    <section class="glass section">
      <h2>核心儀表</h2>
      <div class="grid2">
        <label class="stack"><span class="label">總資產</span><input id="totalAssets" type="number"></label>
        <label class="stack"><span class="label">水庫</span><input id="reservoir" type="number"></label>
        <label class="stack"><span class="label">每月定投</span><input id="monthlyInput" type="number"></label>
        <label class="stack"><span class="label">每月回灌</span><input id="monthlyRecycle" type="number"></label>
        <label class="stack"><span class="label">本月已加碼</span><input id="usedAmmo" type="number"></label>
        <label class="stack"><span class="label">本月已觸發次數</span><input id="monthlyTriggerCount" type="number"></label>
      </div>
      <input id="monthKey" type="hidden">
      <input id="kingCount" type="hidden" value="3">
      <input id="currentDrawdown" type="hidden" value="0">
      <input id="maxTriggerPerMonth" type="hidden" value="6">
      <div class="grid2" style="margin-top:10px">
        <div class="mini"><div class="label">本月總彈藥</div><div id="ammoLimit" class="value mono">0</div></div>
        <div class="mini"><div class="label">剩餘可用</div><div id="ammoRemain" class="value mono" style="color:#67e8f9">0</div></div>
        <div class="mini"><div class="label">本次建議</div><div id="ammoRecommend" class="value mono" style="color:#86efac">0</div></div>
        <div class="mini"><div class="label">紀律分數</div><div id="disciplineText" class="value mono">100</div></div>
      </div>
      <div class="toolbar" style="margin-top:10px">
        <button id="applyRecommendBtn">套用建議</button>
        <button id="resetAmmoBtn" class="dark">本月歸零</button>
      </div>
    </section>

    <section class="glass section">
      <h2>攻守比例</h2>
      <div id="balanceRatioText" class="summary">前鋒 70% ｜ 水庫 30%</div>
      <div class="balance" style="margin-top:10px">
        <div id="balanceAttackBar" class="attack" style="width:70%"></div>
        <div id="balanceReservoirBar" class="defense" style="width:30%"></div>
      </div>
      <div class="note" style="margin-top:10px">看這格就知道現在陣型偏進攻還是偏防守。</div>
    </section>

    <section class="glass section">
      <h2>今日摘要</h2>
      <div id="summaryBoard" class="summary">等待資料載入…</div>
      <div id="recommendBoard" class="summary" style="margin-top:10px;color:#bbf7d0">等待計算…</div>
    </section>

    <section id="kingCards" class="stack"></section>

    <section class="glass section">
      <h2>備註</h2>
      <textarea id="notes" placeholder="可記錄今日動作與想法"></textarea>
    </section>
  </div>

<script>
const API = "https://script.google.com/macros/s/AKfycbw_z3a9kbwrn7FcXxj8fL8tN-tmX7PNTrCVSmwS5g2knCgCWoaqeNwIHFPp9nZt8yQR/exec";

const kingDefs = [
  { code: 'A32001', name: '野村優質', defaultTrigger: -10, anueLink: 'https://www.anuefund.com/fund/detail/A32001' },
  { code: 'A20106', name: 'NASDAQ-100', defaultTrigger: -8, anueLink: 'https://www.anuefund.com/fund/detail/A20106' },
  { code: 'B29037', name: '摩根品牌', defaultTrigger: -12, anueLink: 'https://www.anuefund.com/fund/detail/B29037' }
];

let isBuildingCards = false;
let lastRecommendValue = 0;
let lastTriggeredCandidateNames = [];

function safeEl(id){ return document.getElementById(id); }
function safeSetText(id, value){ const el=safeEl(id); if(el) el.textContent=value; }
function safeSetHTML(id, value){ const el=safeEl(id); if(el) el.innerHTML=value; }
function safeSetValue(id, value){ const el=safeEl(id); if(el) el.value=value; }
function formatMoney(v){ return Number(v || 0).toLocaleString(); }

function getCurrentMonthKey(){
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
}

function getNowText(){
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const dd = String(now.getDate()).padStart(2,'0');
  const hh = String(now.getHours()).padStart(2,'0');
  const mi = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  return `${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`;
}

function parsePrices(text){
  return String(text || '')
    .replace(/[；;｜|]/g, ' ')
    .replace(/\u3000/g, ' ')
    .trim()
    .split(/[\s,，\n\t]+/)
    .map(v => Number(String(v).trim()))
    .filter(n => !Number.isNaN(n) && n > 0);
}

function calcDeviation(prices){
  if(prices.length < 20) return null;
  const recent20 = prices.slice(-20);
  const current = recent20[recent20.length - 1];
  const ma20 = recent20.reduce((a,b)=>a+b,0)/20;
  const deviation = ((current - ma20) / ma20) * 100;
  return { current, ma20, deviation, recent20 };
}

function calcTenDayTrigger(prices, triggerPercent){
  if(prices.length < 11) return null;
  const today = prices[prices.length - 1];
  const prev10 = prices[prices.length - 11];
  const change = ((today - prev10) / prev10) * 100;
  return { today, prev10, change, triggered: change <= triggerPercent };
}

function getBusinessDaysPassed(dateStr){
  if(!dateStr) return null;
  const start = new Date(dateStr + 'T00:00:00');
  const today = new Date();
  today.setHours(0,0,0,0);
  if(start > today) return 0;
  let days = 0;
  const cursor = new Date(start);
  while(cursor < today){
    cursor.setDate(cursor.getDate()+1);
    const day = cursor.getDay();
    if(day !== 0 && day !== 6) days++;
  }
  return days;
}

function getCooldownRemaining(dateStr){
  if(!dateStr) return null;
  const passed = getBusinessDaysPassed(dateStr);
  if(passed === null) return null;
  return Math.max(0, 5 - passed);
}

function getPhaseText(totalAssets){
  if(totalAssets < 3000000) return '基礎累積期';
  if(totalAssets < 8000000) return '穩定成長期';
  return '厚尾複利期';
}

function resetMonthlyIfNeeded(){
  const currentMonthKey = getCurrentMonthKey();
  const savedMonthKey = String(safeEl('monthKey')?.value || '');
  if(savedMonthKey !== currentMonthKey){
    safeSetValue('monthKey', currentMonthKey);
    safeSetValue('usedAmmo', 0);
    safeSetValue('monthlyTriggerCount', 0);
  }
  safeSetText('monthKeyText', currentMonthKey);
}

function setSync(text, ok=true){
  const badge = safeEl('syncBadge');
  safeSetText('syncBadge', text);
  if(badge) badge.style.color = ok ? '#67e8f9' : '#fda4af';
}

function updateBalanceRatio(totalAssets, reservoir){
  const safeTotal = Math.max(0, Number(totalAssets || 0));
  const safeReservoir = Math.max(0, Number(reservoir || 0));
  const attack = Math.max(0, safeTotal - safeReservoir);
  const attackPct = safeTotal > 0 ? Math.round((attack / safeTotal) * 100) : 0;
  const reservoirPct = safeTotal > 0 ? Math.round((safeReservoir / safeTotal) * 100) : 0;
  safeSetText('balanceRatioText', `前鋒 ${attackPct}% ｜ 水庫 ${reservoirPct}%`);
  const attackBar = safeEl('balanceAttackBar');
  const reservoirBar = safeEl('balanceReservoirBar');
  if(attackBar) attackBar.style.width = `${attackPct}%`;
  if(reservoirBar) reservoirBar.style.width = `${reservoirPct}%`;
}

function appendTodayValue(code){
  const today = prompt('輸入今天淨值');
  if(!today) return;
  const num = Number(today);
  if(Number.isNaN(num) || num <= 0){
    alert('請輸入正確數字');
    return;
  }
  const el = safeEl(code + '_prices');
  if(!el) return;
  let arr = parsePrices(el.value);
  arr.push(num);
  if(arr.length > 20) arr = arr.slice(arr.length - 20);
  el.value = arr.join(' ');
  updateVisuals();
}

function getDeviationDecision(deviation, cooldownRemain){
  if(cooldownRemain !== null && cooldownRemain > 0){
    return { cls:'watch', text:`🔒 冷卻中，暫不收割` };
  }
  if(deviation >= 20){
    return { cls:'harvest', text:`🚨 乖離過大，優先收割 20%` };
  }
  if(deviation >= 15){
    return { cls:'harvest', text:`🔴 達收割區，建議收割 20%` };
  }
  if(deviation >= 10){
    return { cls:'watch', text:`🟠 達收割區，建議收割 10%` };
  }
  if(deviation >= 5){
    return { cls:'watch', text:`🟡 接近收割區，先觀察` };
  }
  return { cls:'idle', text:`⚪ 未到收割區，維持紀律` };
}

function getDevClass(dev){
  if(dev >= 15) return 'value mono dev-positive';
  if(dev >= 5) return 'value mono dev-mid';
  return 'value mono dev-low';
}

function ensureKingCards(){
  if(isBuildingCards) return;
  isBuildingCards = true;
  try{
    const wrap = safeEl('kingCards');
    if(!wrap) return;
    wrap.innerHTML = kingDefs.map(k => `
      <section class="glass king">
        <div class="king-head">
          <div>
            <div class="king-title">${k.name}</div>
            <div class="king-sub">${k.code}</div>
          </div>
          <div id="signal_${k.code}" class="chip ok">待判讀</div>
        </div>

        <div class="actions">
          <button class="secondary append-btn" data-code="${k.code}">記錄今天</button>
          <button class="dark clear-btn" data-code="${k.code}">清空</button>
          <a class="btn-link" href="${k.anueLink}" target="_blank" rel="noopener noreferrer">鉅亨淨值</a>
        </div>

        <label class="stack">
          <span class="label">最近 20 筆淨值</span>
          <textarea id="${k.code}_prices" placeholder="由舊到新，今天放最後"></textarea>
        </label>

        <div class="grid2">
          <label class="stack"><span class="label">觸發門檻（負數）</span><input id="${k.code}_trigger" type="number" step="1" value="${k.defaultTrigger}"></label>
          <label class="stack"><span class="label">最後收割日期</span><input id="${k.code}_lastHarvestDate" type="date"></label>
        </div>

        <label class="stack"><span class="label">首波加碼已執行</span><select id="${k.code}_firstwave"><option value="false">否</option><option value="true">是</option></select></label>

        <div id="cooldown_${k.code}" class="cool warn">未設定收割日</div>

        <div class="decision idle" id="decision_${k.code}">等待判讀</div>

        <div class="stat-grid">
          <div class="stat"><div class="label">目前淨值</div><div id="nav_${k.code}" class="value mono">—</div></div>
          <div class="stat"><div class="label">20MA</div><div id="ma_${k.code}" class="value mono">—</div></div>
          <div class="stat"><div class="label">乖離</div><div id="dev_${k.code}" class="value mono">—</div></div>
          <div class="stat"><div class="label">10日跌幅</div><div id="chg10_${k.code}" class="value mono">—</div></div>
          <div class="stat"><div class="label">觸發狀態</div><div id="trigger_${k.code}" class="value" style="font-size:16px">—</div></div>
          <div class="stat"><div class="label">加碼訊號</div><div id="add_${k.code}" class="value" style="font-size:16px">—</div></div>
        </div>

        <div id="action_${k.code}" class="summary" style="background:rgba(2,6,23,.55);border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:12px">等待判讀</div>
      </section>
    `).join('');

    document.querySelectorAll('.append-btn').forEach(btn => {
      btn.addEventListener('click', ()=> appendTodayValue(btn.dataset.code));
    });
    document.querySelectorAll('.clear-btn').forEach(btn => {
      btn.addEventListener('click', ()=>{
        const el = safeEl(btn.dataset.code + '_prices');
        if(el) el.value = '';
        updateVisuals();
      });
    });
    document.querySelectorAll('textarea, input, select').forEach(el => {
      if(el.id !== 'notes'){
        el.addEventListener('input', updateVisuals);
        el.addEventListener('change', updateVisuals);
      }
    });
  } finally {
    isBuildingCards = false;
  }
}

function updateVisuals(){
  try{
    resetMonthlyIfNeeded();

    const totalAssets = Number(safeEl('totalAssets')?.value || 0);
    const reservoir = Number(safeEl('reservoir')?.value || 0);
    const monthlyInput = Number(safeEl('monthlyInput')?.value || 0);
    const monthlyRecycle = Number(safeEl('monthlyRecycle')?.value || 0);
    const usedAmmo = Number(safeEl('usedAmmo')?.value || 0);
    const monthlyTriggerCount = Number(safeEl('monthlyTriggerCount')?.value || 0);
    const maxTriggerPerMonth = Number(safeEl('maxTriggerPerMonth')?.value || 6);

    const ammoLimit = Math.floor(reservoir * 0.15);
    const ammoRemain = Math.max(0, ammoLimit - usedAmmo);
    const triggerRemain = Math.max(0, maxTriggerPerMonth - monthlyTriggerCount);

    safeSetText('phaseText', getPhaseText(totalAssets));
    safeSetText('ammoLimit', formatMoney(ammoLimit));
    safeSetText('ammoRemain', formatMoney(ammoRemain));
    updateBalanceRatio(totalAssets, reservoir);

    let monthStatusText = '綠燈';
    let monthStatusHint = '節奏正常';
    if(usedAmmo > ammoLimit || triggerRemain <= 0 || ammoRemain <= 0){
      monthStatusText = '紅燈';
      monthStatusHint = '本月額度或次數用盡';
    } else if(ammoRemain <= Math.max(6000, ammoLimit * 0.3)){
      monthStatusText = '黃燈';
      monthStatusHint = '彈藥偏緊，請保守';
    }
    safeSetText('monthStatusText', monthStatusText);
    safeSetText('monthStatusHint', monthStatusHint);

    const warnings = [];
    if(monthlyInput !== 9000) warnings.push('固定定投不是 9000');
    if(usedAmmo > ammoLimit) warnings.push('本月子彈超打');
    if(monthlyTriggerCount > maxTriggerPerMonth && maxTriggerPerMonth > 0) warnings.push('本月觸發次數超限');
    if(ammoRemain <= 6000 && usedAmmo <= ammoLimit) warnings.push('本月子彈接近打完');
    const discipline = Math.max(0,100 - warnings.length * 8 - (monthlyInput !== 9000 ? 8 : 0));
    safeSetText('disciplineText', String(discipline));

    const summaryLines = [];
    const recommendLines = [];
    const triggeredCandidates = [];

    kingDefs.forEach(k => {
      const prices = parsePrices(safeEl(k.code+'_prices')?.value || '');
      const calc = calcDeviation(prices);
      const firstWaveDone = String(safeEl(k.code+'_firstwave')?.value || 'false') === 'true';
      const kingTrigger = Number(safeEl(k.code+'_trigger')?.value || k.defaultTrigger);
      const triggerCheck = calcTenDayTrigger(prices, kingTrigger);
      const harvestDate = safeEl(k.code+'_lastHarvestDate')?.value || '';
      const cooldownRemain = getCooldownRemaining(harvestDate);

      const coolEl = safeEl(`cooldown_${k.code}`);
      if(cooldownRemain === null){
        safeSetText(`cooldown_${k.code}`, '未設定收割日');
        if(coolEl) coolEl.className = 'cool warn';
      } else if(cooldownRemain > 0){
        safeSetText(`cooldown_${k.code}`, `🔒 冷卻中：還剩 ${cooldownRemain} 個交易日`);
        if(coolEl) coolEl.className = 'cool danger';
      } else {
        safeSetText(`cooldown_${k.code}`, '✅ 冷卻完成，可操作');
        if(coolEl) coolEl.className = 'cool ok';
      }

      if(!calc){
        safeSetText('signal_'+k.code, '資料不足');
        safeSetText('nav_'+k.code, prices.length ? prices[prices.length-1] : '—');
        safeSetText('ma_'+k.code, `${prices.length}/20`);
        safeSetText('dev_'+k.code, '—');
        safeSetText('chg10_'+k.code, prices.length >= 11 ? '待算' : '需11筆');
        safeSetText('trigger_'+k.code, '待判定');
        safeSetText('add_'+k.code, '待判定');
        safeSetText('action_'+k.code, '請先輸入最近20筆淨值');
        safeSetText('decision_'+k.code, '請補滿 20 筆淨值');
        const dec = safeEl('decision_'+k.code);
        if(dec) dec.className = 'decision idle';
        return;
      }

      const { current, ma20, deviation, recent20 } = calc;
      const minVal = Math.min(...recent20);
      const minIndex = recent20.lastIndexOf(minVal);
      const reboundPct = ((current - minVal) / minVal) * 100;
      const highAfterLow = minIndex < recent20.length - 1 ? Math.max(...recent20.slice(minIndex)) : current;
      const turnedWeak = highAfterLow > current * 1.01;

      let wave='跌勢中';
      if(reboundPct >= 5 && turnedWeak && firstWaveDone) wave='第二波候選';
      else if(reboundPct >= 5 && turnedWeak && !firstWaveDone) wave='反彈後轉弱';
      else if(reboundPct >= 5) wave='反彈觀察期';

      let triggerText='待判定';
      let add='❌ 不加碼';
      let signal='待命';
      let action='不動作';

      if(triggerCheck){
        safeSetText('chg10_'+k.code, `${triggerCheck.change>=0?'+':''}${triggerCheck.change.toFixed(2)}%`);
        if(triggerCheck.triggered){
          triggerText='✅ 已觸發';
          if(ammoRemain<=0 || triggerRemain<=0) add='🚫 禁止';
          else if(wave==='第二波候選') add='🟡 第二波可加';
          else add='✅ 可加碼';

          let score = Math.abs(triggerCheck.change);
          if(wave==='跌勢中') score += 4;
          if(wave==='第二波候選') score += 2;
          if(firstWaveDone) score += 1;

          triggeredCandidates.push({
            name:k.name,
            triggerChange:triggerCheck.change,
            wave,
            score,
            kingTrigger
          });
        } else {
          triggerText='❌ 未觸發';
        }
      } else {
        safeSetText('chg10_'+k.code, '需11筆');
      }

      const decision = getDeviationDecision(deviation, cooldownRemain);
      const decisionEl = safeEl('decision_'+k.code);
      if(decisionEl){
        decisionEl.className = `decision ${decision.cls}`;
        decisionEl.textContent = decision.text;
      }

      if(cooldownRemain !== null && cooldownRemain > 0){
        signal = '冷卻';
        action = `🔒 冷卻中：還剩 ${cooldownRemain} 個交易日`;
      } else {
        if(deviation >= 20){
          signal='再收';
          action='再收割 20%，50% 水庫 / 50% 回原王';
        } else if(deviation >= 15){
          signal='收20';
          action='收割 20%，50% 水庫 / 50% 回原王';
        } else if(deviation >= 10){
          signal='收10';
          action='收割 10%，50% 水庫 / 50% 回原王';
        } else if(deviation >= 5){
          signal='準備';
          action='先觀察，接近收割門檻';
        }
      }

      safeSetText('signal_'+k.code, signal);
      safeSetText('nav_'+k.code, current.toFixed(2));
      safeSetText('ma_'+k.code, ma20.toFixed(2));
      safeSetText('dev_'+k.code, `${deviation>=0?'+':''}${deviation.toFixed(2)}%`);
      const devEl = safeEl('dev_'+k.code);
      if(devEl) devEl.className = getDevClass(deviation);
      safeSetText('trigger_'+k.code, triggerText);
      safeSetText('add_'+k.code, add);
      safeSetText('action_'+k.code, action);

      summaryLines.push(`${k.name}：淨值 ${current.toFixed(2)}｜20MA ${ma20.toFixed(2)}｜乖離 ${deviation>=0?'+':''}${deviation.toFixed(2)}%`);
      if(decision.cls === 'harvest' || decision.cls === 'watch'){
        recommendLines.push(`• ${k.name}：${decision.text}`);
      }
    });

    safeSetHTML('summaryBoard',
      summaryLines.length
        ? `總資產 ${formatMoney(totalAssets)}｜水庫 ${formatMoney(reservoir)}<br><br>${summaryLines.join('<br>')}`
        : '等待資料載入…'
    );

    let recommend = 0;
    if(ammoRemain <= 0 || triggerRemain <= 0) recommend = 0;
    else if(triggeredCandidates.length === 0) recommend = 0;
    else if(reservoir < 150000) recommend = Math.min(ammoRemain, 3000);
    else if(triggeredCandidates.length === 1) recommend = Math.min(ammoRemain, 6000);
    else if(triggeredCandidates.length === 2) recommend = Math.min(ammoRemain, 12000);
    else recommend = Math.min(ammoRemain, 22000);

    safeSetText('ammoRecommend', formatMoney(recommend));
    lastRecommendValue = recommend;
    lastTriggeredCandidateNames = triggeredCandidates.map(x => x.name);

    const triggerText = triggeredCandidates.length
      ? `<br><br>加碼候選：${triggeredCandidates.map(x => `${x.name}（${x.triggerChange.toFixed(2)}%）`).join('、')}`
      : '';

    safeSetHTML(
      'recommendBoard',
      (recommendLines.length ? recommendLines.join('<br>') : '目前沒有達到明確收割區，照紀律持有。')
      + `<br><br>本次建議出手：${formatMoney(recommend)} 元`
      + triggerText
    );
  } catch(err){
    console.error('updateVisuals error', err);
  }
}

async function parseJsonResponse(res){
  const text = await res.text();
  try{
    return JSON.parse(text);
  }catch(e){
    throw new Error('後端回傳不是 JSON：' + text);
  }
}

async function loadData(){
  try{
    setSync('讀取中...', true);
    const res = await fetch(API);
    const data = await parseJsonResponse(res);

    safeSetValue('monthKey', data.monthKey || '');
    safeSetValue('totalAssets', data.totalAssets || 0);
    safeSetValue('reservoir', data.reservoir || 0);
    safeSetValue('monthlyInput', data.monthlyInput || 9000);
    safeSetValue('monthlyRecycle', data.monthlyRecycle || 0);
    safeSetValue('kingCount', data.kingCount || 3);
    safeSetValue('currentDrawdown', data.currentDrawdown || 0);
    safeSetValue('usedAmmo', data.usedAmmo || 0);
    safeSetValue('monthlyTriggerCount', data.monthlyTriggerCount || 0);
    safeSetValue('maxTriggerPerMonth', data.maxTriggerPerMonth || 6);
    safeSetValue('notes', data.notes || '');

    ensureKingCards();

    kingDefs.forEach(k => {
      safeSetValue(k.code+'_prices', data[k.code+'_prices'] || '');
      safeSetValue(k.code+'_firstwave', String(data[k.code+'_firstwave']) === 'true' || data[k.code+'_firstwave'] === true ? 'true' : 'false');
      safeSetValue(k.code+'_trigger', data[k.code+'_trigger'] ?? k.defaultTrigger);
      safeSetValue(k.code+'_lastHarvestDate', data[k.code+'_lastHarvestDate'] || '');
    });

    resetMonthlyIfNeeded();
    safeSetText('lastSyncTime', data.lastSyncTime || '—');
    updateVisuals();
    setSync('已同步', true);
  }catch(err){
    console.error(err);
    setSync('讀取失敗', false);
    alert('讀取失敗：' + err.message);
  }
}

async function saveData(){
  try{
    resetMonthlyIfNeeded();
    setSync('儲存中...', true);

    const payload = {
      monthKey: safeEl('monthKey')?.value || getCurrentMonthKey(),
      totalAssets: safeEl('totalAssets')?.value || 0,
      reservoir: safeEl('reservoir')?.value || 0,
      monthlyInput: safeEl('monthlyInput')?.value || 0,
      monthlyRecycle: safeEl('monthlyRecycle')?.value || 0,
      kingCount: 3,
      currentDrawdown: safeEl('currentDrawdown')?.value || 0,
      usedAmmo: safeEl('usedAmmo')?.value || 0,
      monthlyTriggerCount: safeEl('monthlyTriggerCount')?.value || 0,
      maxTriggerPerMonth: safeEl('maxTriggerPerMonth')?.value || 6,
      notes: safeEl('notes')?.value || '',
      lastSyncTime: getNowText()
    };

    kingDefs.forEach(k => {
      payload[k.code+'_prices'] = safeEl(k.code+'_prices')?.value || '';
      payload[k.code+'_firstwave'] = String(safeEl(k.code+'_firstwave')?.value || 'false') === 'true';
      payload[k.code+'_trigger'] = safeEl(k.code+'_trigger')?.value || k.defaultTrigger;
      payload[k.code+'_lastHarvestDate'] = safeEl(k.code+'_lastHarvestDate')?.value || '';
    });

    const res = await fetch(API, {
      method:'POST',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });

    const data = await parseJsonResponse(res);
    if(data && (data.status === 'ok' || data.status === 'success' || data.ok === true)){
      safeSetText('lastSyncTime', data.lastSyncTime || payload.lastSyncTime || '—');
      setSync('已儲存', true);
    } else {
      throw new Error(data.error || '儲存失敗');
    }
  }catch(err){
    console.error(err);
    setSync('儲存失敗', false);
    alert('儲存失敗：' + err.message);
  }
}

function bindGlobalEvents(){
  safeEl('reloadBtn')?.addEventListener('click', loadData);
  safeEl('saveBtn')?.addEventListener('click', saveData);

  safeEl('applyRecommendBtn')?.addEventListener('click', ()=>{
    if(lastRecommendValue <= 0){
      alert('目前沒有可套用的建議金額。');
      return;
    }
    const usedAmmo = Number(safeEl('usedAmmo')?.value || 0);
    const monthlyTriggerCount = Number(safeEl('monthlyTriggerCount')?.value || 0);
    safeSetValue('usedAmmo', usedAmmo + lastRecommendValue);
    safeSetValue('monthlyTriggerCount', monthlyTriggerCount + 1);
    const noteEl = safeEl('notes');
    if(noteEl){
      const line = `[${getNowText()}] 套用建議 ${formatMoney(lastRecommendValue)} 元｜候選：${lastTriggeredCandidateNames.join('、') || '無'}`;
      noteEl.value = noteEl.value ? `${noteEl.value}\n${line}` : line;
    }
    updateVisuals();
    setSync('已套用待儲存', true);
  });

  safeEl('resetAmmoBtn')?.addEventListener('click', ()=>{
    safeSetValue('usedAmmo', 0);
    updateVisuals();
  });

  document.addEventListener('input', (e)=>{
    if(e.target && e.target.id !== 'notes') updateVisuals();
  });
  document.addEventListener('change', (e)=>{
    if(e.target && e.target.id !== 'notes') updateVisuals();
  });
}

bindGlobalEvents();
ensureKingCards();
safeSetValue('monthKey', getCurrentMonthKey());
updateVisuals();
loadData();
</script>
