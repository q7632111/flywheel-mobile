<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飛輪系統 20.1 Mobile Pro</title>

<style>
body{
  background:#0b0b0b;
  color:#fff;
  font-family:Arial;
  padding:10px;
}

.card{
  background:#151515;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}

.title{
  font-size:14px;
  color:#aaa;
  margin-bottom:6px;
}

.big{
  font-size:18px;
  font-weight:bold;
}

input,textarea{
  width:100%;
  padding:6px;
  border-radius:6px;
  border:none;
  margin-top:5px;
  background:#222;
  color:#fff;
}
</style>
</head>

<body>

<!-- ============================= -->
<!-- 🔥 戰況雷達 -->
<!-- ============================= -->

<div class="card">
  <div class="title">📡 系統戰況</div>
  <div id="battleStatus" class="big"></div>
  <div id="battleAdvice"></div>
</div>

<div class="card">
  <div class="title">🏦 水庫</div>
  <div id="reservoirStatus"></div>
</div>

<!-- ============================= -->
<!-- 🔧 輸入 -->
<!-- ============================= -->

<div class="card">
  <div class="title">總資產</div>
  <input id="totalAssets" oninput="update()">
</div>

<div class="card">
  <div class="title">水庫</div>
  <input id="reservoir" oninput="update()">
</div>

<!-- ============================= -->
<!-- 三王 -->
<!-- ============================= -->

<div class="card">
  <div class="title">王 A（價格）</div>
  <textarea id="A_prices" oninput="update()"></textarea>
  <div id="A_result"></div>
</div>

<div class="card">
  <div class="title">王 B（價格）</div>
  <textarea id="B_prices" oninput="update()"></textarea>
  <div id="B_result"></div>
</div>

<div class="card">
  <div class="title">王 C（價格）</div>
  <textarea id="C_prices" oninput="update()"></textarea>
  <div id="C_result"></div>
</div>

<script>

// =============================
// 工具
// =============================

function parsePrices(str){
  return str.split(',').map(Number).filter(n=>!isNaN(n));
}

function deviation(prices){
  if(prices.length < 20) return null;
  const now = prices[prices.length-1];
  const ma = prices.slice(-20).reduce((a,b)=>a+b)/20;
  return ((now-ma)/ma)*100;
}

function monthKey(){
  const d=new Date();
  return d.getFullYear()+"-"+(d.getMonth()+1);
}

// =============================
// 收割計數
// =============================

function getCount(code){
  return Number(localStorage.getItem(code)||0);
}

function addCount(code){
  localStorage.setItem(code,getCount(code)+1);
}

function resetMonth(){
  const key="month";
  const now=monthKey();
  if(localStorage.getItem(key)!==now){
    localStorage.setItem(key,now);
    ["A","B","C"].forEach(k=>localStorage.setItem(k,0));
  }
}

// =============================
// 區域
// =============================

function zone(r){
  if(r<150000) return "war";
  if(r<180000) return "transition";
  if(r<600000) return "ignite";
  if(r<1000000) return "prepare";
  return "compound";
}

// =============================
// 核心判斷
// =============================

function decision(dev,res,total,code){

  const attack = total-res;
  if(total>0 && attack/total <0.6){
    return "🛑 禁止收割（攻擊不足）";
  }

  if(getCount(code)>=2){
    return "⛔ 本月已收2次";
  }

  const z = zone(res);

  if(z==="war"||z==="transition"){
    if(dev>=10){addCount(code);return "收至50%";}
    if(dev>=5){addCount(code);return "收10%";}
  }

  if(z==="ignite"){
    if(dev>=20){addCount(code);return "收20%";}
    if(dev>=15){addCount(code);return "收20%";}
    if(dev>=10){addCount(code);return "收10%";}
  }

  if(z==="compound"){
    if(dev>=25){addCount(code);return "收20%";}
    if(dev>=15){addCount(code);return "收10%";}
  }

  return "觀望";
}

// =============================
// 戰況雷達
// =============================

function radar(total,res){

  const attack = total-res;
  const ratio = total>0?attack/total:1;

  let status="";
  let advice="";
  let rText="";

  if(ratio<0.6){
    status="🔴 攻擊不足";
    advice="停止收割";
  }else{
    status="🟢 正常";
  }

  if(res<80000){
    rText="🔴 危險";
    advice="進入保命模式";
  }else if(res<150000){
    rText="🟡 偏低";
  }else if(res<600000){
    rText="🟢 正常";
  }else{
    rText="🟡 厚尾";
  }

  document.getElementById("battleStatus").innerText=status;
  document.getElementById("battleAdvice").innerText=advice;
  document.getElementById("reservoirStatus").innerText=rText;
}

// =============================
// 主更新
// =============================

function update(){

  resetMonth();

  const total = Number(document.getElementById("totalAssets").value||0);
  const res = Number(document.getElementById("reservoir").value||0);

  radar(total,res);

  ["A","B","C"].forEach(k=>{
    const p=parsePrices(document.getElementById(k+"_prices").value);
    const d=deviation(p);

    if(d===null){
      document.getElementById(k+"_result").innerText="資料不足";
      return;
    }

    const dec=decision(d,res,total,k);
    document.getElementById(k+"_result").innerText=
      `乖離:${d.toFixed(2)}% → ${dec} (${getCount(k)}/2)`;
  });
}

</script>

</body>
</html>
