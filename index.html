<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飛輪系統 Mobile 完整版</title>

<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;padding:10px;}
.card{background:#151515;border-radius:12px;padding:12px;margin-bottom:10px;}
.title{font-size:14px;color:#aaa;margin-bottom:6px;}
input,textarea{width:100%;padding:6px;border-radius:6px;border:none;margin-top:5px;background:#222;color:#fff;}
.btn{margin-top:6px;padding:6px;border:none;border-radius:6px;background:#2a2a2a;color:#fff;}
.green{color:#00e676;}
.yellow{color:#ffd600;}
.red{color:#ff5252;}
</style>
</head>

<body>

<div class="card">
<div class="title">總資產</div>
<input id="totalAssets" oninput="update()">
</div>

<div class="card">
<div class="title">水庫</div>
<input id="reservoir" oninput="update()">
</div>

<!-- 三王 -->
<div class="card">
<div class="title">王A</div>
<textarea id="A_prices" oninput="update()"></textarea>
<div id="A_result"></div>
<button class="btn" onclick="logAction('A','收割')">收割</button>
<button class="btn" onclick="logAction('A','加碼')">加碼</button>
</div>

<div class="card">
<div class="title">王B</div>
<textarea id="B_prices" oninput="update()"></textarea>
<div id="B_result"></div>
<button class="btn" onclick="logAction('B','收割')">收割</button>
<button class="btn" onclick="logAction('B','加碼')">加碼</button>
</div>

<div class="card">
<div class="title">王C</div>
<textarea id="C_prices" oninput="update()"></textarea>
<div id="C_result"></div>
<button class="btn" onclick="logAction('C','收割')">收割</button>
<button class="btn" onclick="logAction('C','加碼')">加碼</button>
</div>

<!-- 操作紀錄 -->
<div class="card">
<div class="title">操作紀錄</div>
<div id="logList"></div>
<button class="btn" onclick="clearLog()">清空</button>
</div>

<script>

// ===== 基本工具 =====
function parsePrices(str){
if(!str) return [];
return str.split(',').map(Number).filter(n=>!isNaN(n));
}

function deviation(prices){
if(prices.length<20) return null;
let sum=0;
for(let i=prices.length-20;i<prices.length;i++){sum+=prices[i];}
const ma=sum/20;
const now=prices[prices.length-1];
return ((now-ma)/ma)*100;
}

// ===== 收割次數 =====
function getCount(k){
return Number(localStorage.getItem("count_"+k)||0);
}
function addCount(k){
localStorage.setItem("count_"+k,getCount(k)+1);
}

// ===== 判斷 =====
function judge(type,k,total,res){

const attack=total-res;
let result={text:"合理",cls:"green"};

if(type==="收割"){
if(total>0 && attack/total<0.6){
return {text:"違規（攻擊不足）",cls:"red"};
}
if(getCount(k)>=2){
return {text:"違規（超過次數）",cls:"red"};
}
if(res<150000){
return {text:"警告（水庫偏低）",cls:"yellow"};
}
addCount(k);
}

return result;
}

// ===== 更新 =====
function update(){

const total=Number(document.getElementById("totalAssets").value||0);
const res=Number(document.getElementById("reservoir").value||0);

["A","B","C"].forEach(k=>{
const p=parsePrices(document.getElementById(k+"_prices").value);
const d=deviation(p);
if(d===null){
document.getElementById(k+"_result").innerText="資料不足";
return;
}
document.getElementById(k+"_result").innerText=`乖離:${d.toFixed(2)}%`;
});
}

// ===== 紀錄 =====
function logAction(k,type){

const total=Number(document.getElementById("totalAssets").value||0);
const res=Number(document.getElementById("reservoir").value||0);

const judgeResult=judge(type,k,total,res);

const now=new Date().toLocaleString();

const text=`${now}｜${k}｜${type}｜<span class="${judgeResult.cls}">${judgeResult.text}</span>｜水庫:${res}`;

let logs=JSON.parse(localStorage.getItem("logs")||"[]");
logs.unshift(text);

localStorage.setItem("logs",JSON.stringify(logs));

renderLog();
}

function renderLog(){
const logs=JSON.parse(localStorage.getItem("logs")||"[]");
document.getElementById("logList").innerHTML=
logs.map(l=>`<div>${l}</div>`).join('');
}

function clearLog(){
localStorage.removeItem("logs");
renderLog();
}

renderLog();

</script>

</body>
</html>
